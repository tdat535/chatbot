# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=20r/s;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Block direct external access to chatbot /ask and /train endpoints
    location ~ ^/chatbot/(ask|train|train-url|chunks) {
        return 403;
    }

    # Proxy chatbot admin UI (chunks list, etc.) — internal only, rate limited
    location /chatbot/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://chatbot:8000/;
        proxy_set_header Host $host;
    }

    # Proxy API → backend (rate limited)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Webhook: allow higher burst (Facebook/Zalo batch events)
    location /webhook/ {
        limit_req zone=webhook_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy Socket.IO → backend
    location /socket.io/ {
        limit_req zone=socket_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
